name: Auto Release on Push

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Bump version and create tag
        id: version_bump
        run: |
          # Get current version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          
          # Split version into parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          
          # Increment patch version (minor in your terminology)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          # Update package.json with new version
          npm version $NEW_VERSION --no-git-tag-version
          
          # Commit the version change
          git add package.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
          
          # Create and push tag
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version_bump.outputs.new_version }}
          name: Release v${{ steps.version_bump.outputs.new_version }}
          body: |
            ## Changes in this release
            
            Automated release triggered by push to main branch.
            
            ### Version Update
            - Bumped patch version from previous release
            
            ### What's Changed
            See commits for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
